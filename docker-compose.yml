services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sportactual
      - SPRING_DATASOURCE_USERNAME=sportuser
      - SPRING_DATASOURCE_PASSWORD=sportpass
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY:-}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY:-}
      - API_SPORTS_KEY=${API_SPORTS_KEY:-}
      - EXTERNAL_API_SPORTS_KEY=${API_SPORTS_KEY:-}
      - NEWSAPI_KEY=781d8e3f316a4575b5b0ed664deca938
    depends_on:
      - postgres
      - redis
    networks:
      - sport-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=sportactual
      - POSTGRES_USER=sportuser
      - POSTGRES_PASSWORD=sportpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d
    networks:
      - sport-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sport-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - sport-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  sport-network:
    driver: bridge