<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Article - SportActual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9em;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }
        
        .article-header {
            padding: 30px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .article-title {
            font-size: 2em;
            font-weight: 700;
            color: #212529;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        
        .article-meta {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            color: #6c757d;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .article-meta span {
            background: #f8f9fa;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
        }
        
        .article-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .article-content {
            padding: 30px;
            line-height: 1.8;
            color: #495057;
            font-size: 1.1em;
        }
        
        .article-content p {
            margin-bottom: 20px;
        }
        
        .article-actions {
            padding: 30px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .article-actions a {
            padding: 12px 24px;
            background: #4F46E5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .article-actions a:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #6c757d;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
            border: 1px solid #f5c6cb;
        }
        
        .not-found {
            text-align: center;
            padding: 60px;
            color: #6c757d;
        }
        
        .not-found h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #495057;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }
            
            .header {
                padding: 20px;
            }
            
            .article-title {
                font-size: 1.5em;
            }
            
            .article-header, .article-content, .article-actions {
                padding: 20px;
            }
            
            .article-actions {
                flex-direction: column;
            }
            
            .article-actions a {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="javascript:history.back()" class="back-button">
                <span>«</span> Retour à la recherche
            </a>
            <h1>SportActual</h1>
            <p>Actualités sportives en détail</p>
        </div>
        
        <div id="articleContent">
            <div class="loading">
                <p>Chargement de l'article...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8080/api/news';
        
        function getArticleId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'Date inconnue';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('fr-FR', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (e) {
                return dateString;
            }
        }
        
        async function loadArticle() {
            const articleId = getArticleId();
            
            if (!articleId) {
                showError('Aucun identifiant d\'article spécifié');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/${articleId}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        showNotFound();
                    } else {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return;
                }
                
                const article = await response.json();
                displayArticle(article);
                
            } catch (error) {
                console.error('Error loading article:', error);
                showError('Erreur lors du chargement de l\'article. Veuillez réessayer.');
            }
        }
        
        function displayArticle(article) {
            const contentDiv = document.getElementById('articleContent');
            const pageTitle = document.getElementById('pageTitle');
            
            // Mettre à jour le titre de la page
            pageTitle.textContent = article.title || 'Article';
            
            // Construire le HTML de l'article
            const articleHtml = `
                <div class="article-header">
                    <h1 class="article-title">${escapeHtml(article.title || 'Sans titre')}</h1>
                    <div class="article-meta">
                        <span>Source: ${escapeHtml(article.source || 'Inconnue')}</span>
                        <span>Auteur: ${escapeHtml(article.author || 'Inconnu')}</span>
                        <span>Date: ${formatDate(article.publishedAt)}</span>
                    </div>
                    ${article.imageUrl ? 
                        `<img src="${article.imageUrl}" alt="${escapeHtml(article.title || 'Image')}" class="article-image" 
                         onerror="this.style.display='none'">` : ''}
                </div>
                
                <div class="article-content">
                    ${formatContent(article.content)}
                </div>
                
                <div class="article-actions">
                    ${article.articleUrl ? 
                        `<a href="${article.articleUrl}" target="_blank">
                            <span>»</span> Article complet
                        </a>` : ''}
                    ${article.fullArticleUrl ? 
                        `<a href="${article.fullArticleUrl}" target="_blank">
                            <span>»</span> Source originale
                        </a>` : ''}
                    <a href="javascript:window.print()">
                        <span>»</span> Imprimer
                    </a>
                    <a href="javascript:navigator.share ? navigator.share({
                        title: article.title,
                        text: article.summary,
                        url: window.location.href
                    }) : null">
                        <span>»</span> Partager
                    </a>
                </div>
            `;
            
            contentDiv.innerHTML = articleHtml;
        }
        
        function formatContent(content) {
            if (!content) return '<p>Aucun contenu disponible.</p>';
            
            // Convertir les sauts de ligne en paragraphes
            let formatted = escapeHtml(content);
            
            // Gérer les paragraphes
            formatted = formatted.split('\n\n').map(paragraph => {
                if (paragraph.trim()) {
                    return `<p>${paragraph.trim()}</p>`;
                }
                return '';
            }).join('');
            
            // Gérer les listes
            formatted = formatted.replace(/^-\s+(.+)$/gm, '<li>$1</li>');
            formatted = formatted.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            
            // Gérer le gras
            formatted = formatted.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            // Gérer l'italique
            formatted = formatted.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            return formatted;
        }
        
        function showError(message) {
            const contentDiv = document.getElementById('articleContent');
            contentDiv.innerHTML = `
                <div class="error">
                    <h3>Erreur</h3>
                    <p>${message}</p>
                    <a href="javascript:history.back()" class="back-button" style="margin-top: 15px; display: inline-block;">
                        <span>«</span> Retour
                    </a>
                </div>
            `;
        }
        
        function showNotFound() {
            const contentDiv = document.getElementById('articleContent');
            contentDiv.innerHTML = `
                <div class="not-found">
                    <h2>Article non trouvé</h2>
                    <p>L'article que vous recherchez n'existe pas ou a été supprimé.</p>
                    <a href="javascript:history.back()" class="back-button" style="margin-top: 20px; display: inline-block;">
                        <span>«</span> Retour à la recherche
                    </a>
                </div>
            `;
        }
        
        // Charger l'article au démarrage
        document.addEventListener('DOMContentLoaded', loadArticle);
        
        // Gérer les erreurs de chargement d'images
        document.addEventListener('error', function(e) {
            if (e.target.tagName === 'IMG') {
                e.target.style.display = 'none';
            }
        }, true);
    </script>
</body>
</html>
