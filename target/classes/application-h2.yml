spring:
  config:
    activate:
      on-profile: h2
  
  datasource:
    url: jdbc:h2:file:./data/sportactual;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  flyway:
    enabled: false
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  cache:
    type: none
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

logging:
  level:
    com.actuSport: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
