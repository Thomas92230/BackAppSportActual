spring:
  application:
    name: actu-sport-back
  
  profiles:
    active: h2
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:fake-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:fake-secret}
            scope: profile, email
  
  task:
    scheduling:
      pool:
        size: 4
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.actuSport: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

external:
  api:
    sports:
      base-url: https://v3.football.api-sports.io
      key: ${API_SPORTS_KEY:}
    espn:
      base-url: https://site.web.api.espn.com
    newsapi:
      base-url: https://newsapi.org/v2
      api-key: ${NEWSAPI_KEY:}
    guardian:
      base-url: https://content.guardianapis.com
      api-key: cf1811d2-3e59-4c13-9f9e-318313da2c7f
    thesportsdb:
      base-url: https://www.thesportsdb.com/api/v1/json
    rapidapi:
      key: ${RAPIDAPI_KEY:}
      host: v3.football.api-sports.io
    worldnews:
      base-url: https://worldnewsapi.org/api
      api-key: 97b747ae2fd64bc4812d0ec8b1f8bc16

aws:
  region: ${AWS_REGION:us-east-1}
  access-key: ${AWS_ACCESS_KEY:fake-key}
  secret-key: ${AWS_SECRET_KEY:fake-secret}
  sns:
    topic-arn: ${AWS_SNS_TOPIC_ARN:fake-arn}

jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
  expiration: 86400
