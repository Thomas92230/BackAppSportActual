spring:
  application:
    name: actu-sport-back
  
  profiles:
    active: dev
  
  datasource:
    url: jdbc:postgresql://localhost:5432/sportactual
    username: sportuser
    password: sportpass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  spring:
    data:
      redis:
        host: localhost
        port: 6379
        timeout: 2s
        lettuce:
          pool:
            max-active: 8
            max-idle: 8
            min-idle: 0
            max-wait: -1ms
  
  cache:
    type: redis
    redis:
      time-to-live: 600000
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:fake-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:fake-secret}
            scope: profile, email
  
  task:
    scheduling:
      pool:
        size: 4
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.actuSport: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

external:
  api:
    sports:
      base-url: https://v3.football.api-sports.io
      key: ${API_SPORTS_KEY:}
    espn:
      base-url: https://site.web.api.espn.com

aws:
  region: ${AWS_REGION:us-east-1}
  access-key: ${AWS_ACCESS_KEY:fake-key}
  secret-key: ${AWS_SECRET_KEY:fake-secret}
  sns:
    topic-arn: ${AWS_SNS_TOPIC_ARN:fake-arn}

jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
  expiration: 86400

---
spring:
  config:
    activate:
      on-profile: docker
  
  datasource:
    url: jdbc:postgresql://postgres:5432/sportactual
  
  data:
    redis:
      host: redis
