spring:
  application:
    name: actu-sport-back
  
  profiles:
    active: h2
  
  datasource:
    url: jdbc:h2:file:./data/sportactual;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  flyway:
    enabled: false
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  cache:
    type: none
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:fake-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:fake-secret}
            scope: profile, email
  
  task:
    scheduling:
      pool:
        size: 4
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.actuSport: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

external:
  api:
    sports:
      base-url: https://v3.football.api-sports.io
      key: ${API_SPORTS_KEY:}
    espn:
      base-url: https://site.web.api.espn.com
    newsapi:
      base-url: https://newsapi.org/v2
      api-key: 781d8e3f316a4575b5b0ed664deca938

aws:
  region: ${AWS_REGION:us-east-1}
  access-key: ${AWS_ACCESS_KEY:fake-key}
  secret-key: ${AWS_SECRET_KEY:fake-secret}
  sns:
    topic-arn: ${AWS_SNS_TOPIC_ARN:fake-arn}

jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
  expiration: 86400

---
spring:
  config:
    activate:
      on-profile: docker
  
  datasource:
    url: jdbc:postgresql://postgres:5432/sportactual
    driver-class-name: org.postgresql.Driver
    username: sportuser
    password: sportpass
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  data:
    redis:
      host: redis
      port: 6379
